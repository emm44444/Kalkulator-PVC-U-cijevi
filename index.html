<div class="card">
<h3>Protok Q (m³/h)</h3>
<input id="flow" type="number" value="10" oninput="calc()" />
</div>

<div class="card" id="usis"></div>
<div class="card" id="tlacni"></div>

<script>
const data = [
{d:25,A:0.00038},{d:32,A:0.00063},{d:40,A:0.00103},
{d:50,A:0.00160},{d:63,A:0.00255},{d:75,A:0.00361},
{d:90,A:0.00520},{d:110,A:0.00776},{d:125,A:0.01002},
{d:140,A:0.01258},{d:160,A:0.01641},{d:180,A:0.02081},
{d:200,A:0.02566},{d:225,A:0.03248},{d:250,A:0.04009},
{d:280,A:0.05033},{d:315,A:0.06376},{d:400,A:0.10174}
];

function find(flow, limit){
const q = flow/3600;
for(let p of data){
if((q/p.A)<=limit) return p.d;
}
return null;
}

function render(id,title,limit){
const flow = parseFloat(document.getElementById("flow").value)||0;
const d = find(flow,limit);

let html = `<h3>${title}</h3>`;

if(d){
html += `<div class="result ok">Preporučeni promjer:<br><div class="big">${d} mm</div></div>`;
}else{
html += `<div class="result warn">Nema odgovarajuće cijevi</div>`;
}

document.getElementById(id).innerHTML = html;
}

function calc(){
render("usis","Usisni cjevovod",1.5);
render("tlacni","Tlačni cjevovod",2.3);
}

calc();
</script>
